name: Multi-Version Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run local matrix build
        shell: pwsh
        run: |
          ./scripts/local/build-multiversion.ps1 -MatrixPath "scripts/local/mc-matrix-26.json" -OutputDir "dist/multiversion" -UseIsolatedGradleHome

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: statusmod-multiversion
          path: dist/multiversion

  publish:
    needs: build
    runs-on: windows-latest
    if: ${{ secrets.MODRINTH_PROJECT_ID != '' && secrets.MODRINTH_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: statusmod-multiversion
          path: dist/multiversion

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: python -m pip install requests

      - name: Publish to Modrinth
        shell: pwsh
        env:
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: |
          python scripts/local/publish_multiversion.py dist/multiversion
