name: Fabric Multi-Version Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Fabric versions
        shell: pwsh
        run: |
          .\scripts\local\build-multiversion.ps1 -Loaders fabric -OutputDir "dist/multiversion" -UseIsolatedGradleHome -ContinueOnError:$false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: statusmod-fabric-multiversion
          path: dist/multiversion
          if-no-files-found: error

  publish:
    needs: build
    runs-on: windows-latest
    if: ${{ secrets.MODRINTH_PROJECT_ID != '' && secrets.MODRINTH_TOKEN != '' && secrets.CURSEFORGE_PROJECT_ID != '' && secrets.CURSEFORGE_API_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: statusmod-fabric-multiversion
          path: dist/multiversion

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: python -m pip install requests

      - name: Publish to Modrinth and CurseForge
        shell: pwsh
        env:
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          RELEASE_TYPE: release
          RELEASE_CHANGELOG: ${{ github.event.head_commit.message }}
        run: |
          python scripts/local/publish_multiversion.py dist/multiversion
