name: Build and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type for Modrinth/CurseForge (release|beta|alpha)"
        required: false
        default: "release"
        type: choice
        options:
          - release
          - beta
          - alpha
      game_versions:
        description: "Optional game versions (comma or newline separated). Leave empty to use gradle.properties minecraft_version."
        required: false
        default: ""
        type: string
      dry_run:
        description: "Build and validate only. Skip tag, GitHub release, Modrinth and CurseForge upload."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    timeout-minutes: 40
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      mc_version: ${{ steps.meta.outputs.mc_version }}
      jar_name: ${{ steps.meta.outputs.jar_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (and write version) with retry
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Gradle build attempt ${attempt}/3"
            if ./gradlew clean build writeVersion --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Gradle build failed after 3 attempts." >&2
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Resolve publish metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION=""
          if [ -f build/version.txt ]; then
            VERSION="$(tr -d '\n' < build/version.txt)"
          elif [ -f version.txt ]; then
            VERSION="$(tr -d '\n' < version.txt)"
          fi

          if [ -z "$VERSION" ]; then
            echo "Unable to determine version." >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version is not semver-like: '$VERSION'" >&2
            exit 1
          fi

          MC_VERSION="$(grep -E '^minecraft_version=' gradle.properties | head -n1 | cut -d'=' -f2 | tr -d '\r\n')"
          if [ -z "$MC_VERSION" ]; then
            echo "Unable to determine minecraft_version from gradle.properties." >&2
            exit 1
          fi

          mapfile -t JARS < <(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-sources.jar" | sort)
          if [ "${#JARS[@]}" -eq 0 ]; then
            echo "No runtime JAR found in build/libs." >&2
            ls -la build/libs || true
            exit 1
          fi

          EXPECTED_1="build/libs/statusmod-${VERSION}.jar"
          EXPECTED_2="build/libs/status-mod-${VERSION}.jar"
          JAR="${JARS[0]}"
          if [ -f "$EXPECTED_1" ]; then
            JAR="$EXPECTED_1"
          elif [ -f "$EXPECTED_2" ]; then
            JAR="$EXPECTED_2"
          fi

          JAR_NAME="$(basename "$JAR")"
          sha256sum "$JAR" > "build/libs/${JAR_NAME}.sha256"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "mc_version=$MC_VERSION" >> "$GITHUB_OUTPUT"
          echo "jar=$JAR" >> "$GITHUB_OUTPUT"
          echo "jar_name=$JAR_NAME" >> "$GITHUB_OUTPUT"

      - name: Verify JAR metadata
        shell: bash
        run: |
          set -euo pipefail
          JAR="${{ steps.meta.outputs.jar }}"
          jar tf "$JAR" | grep -q '^fabric.mod.json$'
          jar tf "$JAR" | grep -q '^assets/status-mod/icon.png$'
          echo "JAR verification passed for $JAR"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: statusmod-release
          path: |
            ${{ steps.meta.outputs.jar }}
            build/libs/${{ steps.meta.outputs.jar_name }}.sha256
            build/version.txt
          if-no-files-found: error
          retention-days: 14

  publish:
    timeout-minutes: 35
    needs: build
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: statusmod-release
          path: dist

      - name: Resolve release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t JARS < <(find dist -type f -name "*.jar" ! -name "*-sources.jar" | sort)
          if [ "${#JARS[@]}" -eq 0 ]; then
            echo "No release JAR found in downloaded artifact." >&2
            find dist -maxdepth 4 -type f -print || true
            exit 1
          fi
          JAR="${JARS[0]}"
          SHA_FILE="${JAR}.sha256"
          if [ ! -f "$SHA_FILE" ]; then
            echo "Checksum file not found: $SHA_FILE" >&2
            exit 1
          fi
          echo "jar=$JAR" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA_FILE" >> "$GITHUB_OUTPUT"

      - name: Verify release artifact checksum
        shell: bash
        run: |
          set -euo pipefail
          JAR="${{ steps.assets.outputs.jar }}"
          SHA_FILE="${{ steps.assets.outputs.sha }}"
          EXPECTED="$(awk '{print $1}' "$SHA_FILE" | tr -d '\r\n')"
          ACTUAL="$(sha256sum "$JAR" | awk '{print $1}' | tr -d '\r\n')"
          if [ -z "$EXPECTED" ] || [ -z "$ACTUAL" ]; then
            echo "Checksum validation failed: missing hash values." >&2
            exit 1
          fi
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Checksum mismatch for $JAR" >&2
            echo "expected=$EXPECTED" >&2
            echo "actual=$ACTUAL" >&2
            exit 1
          fi
          echo "Checksum OK for $JAR"

      - name: Resolve publish options
        id: options
        env:
          INPUT_RELEASE_TYPE: ${{ github.event.inputs.release_type }}
          INPUT_GAME_VERSIONS: ${{ github.event.inputs.game_versions }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          DEFAULT_MC_VERSION: ${{ needs.build.outputs.mc_version }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TYPE="${INPUT_RELEASE_TYPE:-release}"
          case "$RELEASE_TYPE" in
            release|beta|alpha) ;;
            *)
              echo "Invalid release_type: $RELEASE_TYPE" >&2
              exit 1
              ;;
          esac

          DRY_RUN="false"
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            DRY_RUN="true"
          fi

          RAW_GAME_VERSIONS="${INPUT_GAME_VERSIONS:-}"
          if [ -z "${RAW_GAME_VERSIONS//[[:space:]]/}" ]; then
            RAW_GAME_VERSIONS="$DEFAULT_MC_VERSION"
          fi

          GAME_VERSIONS="$(printf '%s\n' "$RAW_GAME_VERSIONS" | tr ',;' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d')"
          if [ -z "$GAME_VERSIONS" ]; then
            echo "No valid game_versions resolved." >&2
            exit 1
          fi

          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          {
            echo "game_versions<<EOF"
            echo "$GAME_VERSIONS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Semver guard (requires version bump)
        if: steps.options.outputs.dry_run != 'true'
        env:
          VERSION: ${{ needs.build.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found; semver guard passed."
            exit 0
          fi

          LAST_VERSION="${LAST_TAG#v}"
          if [ "$VERSION" = "$LAST_VERSION" ]; then
            if git rev-parse -q --verify "refs/tags/${LAST_TAG}" >/dev/null; then
              echo "Version equals latest tag (${LAST_TAG}); allowing republish/retry mode."
              exit 0
            fi
            echo "Version bump required: version.txt is still $VERSION (latest tag: $LAST_TAG)." >&2
            exit 1
          fi

          HIGHEST="$(printf '%s\n%s\n' "$LAST_VERSION" "$VERSION" | sort -V | tail -n1)"
          if [ "$HIGHEST" != "$VERSION" ]; then
            echo "Version bump required: current version $VERSION is not greater than latest tagged version $LAST_VERSION." >&2
            exit 1
          fi

          echo "Semver guard passed: $LAST_VERSION -> $VERSION"

      - name: Generate draft release notes from commits since last tag
        id: notes
        env:
          VERSION: ${{ needs.build.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          NOTES_FILE="dist/RELEASE_NOTES.md"
          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"

          {
            echo "## StatusMod ${TAG}"
            echo
            if [ -n "$LAST_TAG" ]; then
              echo "Changes since \`${LAST_TAG}\`:"
              echo
              git log "${LAST_TAG}..HEAD" --pretty='- %h %s (@%an)' --no-merges || true
            else
              echo "Initial release notes:"
              echo
              git log --pretty='- %h %s (@%an)' --no-merges -n 50 || true
            fi
          } > "$NOTES_FILE"

          if ! grep -q '^- ' "$NOTES_FILE"; then
            echo "- No user-facing commit messages found." >> "$NOTES_FILE"
          fi

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        id: tag
        if: steps.options.outputs.dry_run != 'true'
        env:
          PUBLISH_PAT: ${{ secrets.PUBLISH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"

          if [ -n "${PUBLISH_PAT}" ]; then
            TOKEN="$PUBLISH_PAT"
          else
            TOKEN="$GITHUB_TOKEN"
          fi
          git push "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git" "$TAG"

      - name: Create/Update GitHub Release
        if: steps.options.outputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: StatusMod ${{ steps.tag.outputs.tag }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: |
            ${{ steps.assets.outputs.jar }}
            ${{ steps.assets.outputs.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check publish secrets
        id: secrets_check
        if: steps.options.outputs.dry_run != 'true'
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for key in MODRINTH_TOKEN MODRINTH_PROJECT_ID CURSEFORGE_TOKEN CURSEFORGE_PROJECT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "Missing secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Modrinth and CurseForge
        id: mc_publish
        if: steps.secrets_check.outputs.ready == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          version-type: ${{ steps.options.outputs.release_type }}
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: ${{ steps.assets.outputs.jar }}
          game-versions: ${{ steps.options.outputs.game_versions }}
          loaders: fabric
          name: StatusMod ${{ steps.tag.outputs.tag }}
          version: ${{ steps.tag.outputs.tag }}

      - name: Retry upload to Modrinth and CurseForge once
        id: mc_publish_retry
        if: steps.secrets_check.outputs.ready == 'true' && steps.mc_publish.outcome == 'failure'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          version-type: ${{ steps.options.outputs.release_type }}
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: ${{ steps.assets.outputs.jar }}
          game-versions: ${{ steps.options.outputs.game_versions }}
          loaders: fabric
          name: StatusMod ${{ steps.tag.outputs.tag }}
          version: ${{ steps.tag.outputs.tag }}

      - name: Install Python dependencies for fallback uploader
        if: steps.secrets_check.outputs.ready == 'true' && steps.mc_publish.outcome == 'failure' && steps.mc_publish_retry.outcome == 'failure'
        run: python -m pip install --upgrade pip requests

      - name: Run fallback uploader
        if: steps.secrets_check.outputs.ready == 'true' && steps.mc_publish.outcome == 'failure' && steps.mc_publish_retry.outcome == 'failure'
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          VERSION: ${{ steps.tag.outputs.tag }}
          GAME_VERSIONS: ${{ steps.options.outputs.game_versions }}
          RELEASE_TYPE: ${{ steps.options.outputs.release_type }}
        run: |
          python ./.github/scripts/upload_release.py "${{ steps.assets.outputs.jar }}"

      - name: Dry run summary
        if: steps.options.outputs.dry_run == 'true'
        shell: bash
        run: |
          echo "Dry run enabled. Skipped tag creation and publishing."
          echo "Version: ${{ needs.build.outputs.version }}"
          echo "Release type: ${{ steps.options.outputs.release_type }}"
          echo "Game versions:"
          printf '%s\n' "${{ steps.options.outputs.game_versions }}"

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          echo "Build version: ${{ needs.build.outputs.version }}"
          echo "Dry run: ${{ steps.options.outputs.dry_run }}"
          echo "mc-publish first attempt: ${{ steps.mc_publish.outcome }}"
          echo "mc-publish retry: ${{ steps.mc_publish_retry.outcome }}"
