name: Build and Publish Multi-Version

on:
  workflow_dispatch: {}

concurrency:
  group: publish-multi-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-all-versions:
    timeout-minutes: 180
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build all Minecraft versions
        run: |
          set -euo pipefail
          cp gradle.properties gradle.properties.bak
          trap 'if [ -f gradle.properties.bak ]; then mv -f gradle.properties.bak gradle.properties; fi' EXIT

          # Define versions to build
          versions=(
            "1.21.10:1.21.10+build.1:0.136.0+1.21.10"
            "1.21.9:1.21.9+build.1:0.136.0+1.21.9"
            "1.21.8:1.21.8+build.1:0.135.0+1.21.8"
            "1.21.7:1.21.7+build.1:0.134.0+1.21.7"
            "1.21.6:1.21.6+build.1:0.134.0+1.21.6"
            "1.21.5:1.21.5+build.1:0.134.0+1.21.5"
            "1.21.4:1.21.4+build.1:0.132.0+1.21.4"
            "1.21.3:1.21.3+build.1:0.132.0+1.21.3"
            "1.21.2:1.21.2+build.1:0.132.0+1.21.2"
            "1.21.1:1.21.1+build.1:0.132.0+1.21.1"
            "1.20.6:1.20.6+build.1:0.100.0+1.20.6"
            "1.20.5:1.20.5+build.1:0.100.0+1.20.5"
            "1.20.4:1.20.4+build.1:0.100.0+1.20.4"
            "1.20.3:1.20.3+build.1:0.100.0+1.20.3"
            "1.20.2:1.20.2+build.1:0.92.0+1.20.2"
            "1.20.1:1.20.1+build.1:0.92.2+1.20.1"
            "1.19.4:1.19.4+build.1:0.90.7+1.19.4"
            "1.19.3:1.19.3+build.1:0.82.2+1.19.3"
            "1.19.2:1.19.2+build.1:0.80.0+1.19.2"
            "1.19:1.19+build.1:0.76.0+1.19"
          )
          
          failed_versions=()
          built_versions=()
          for version_info in "${versions[@]}"; do
            IFS=':' read -r mc_version yarn_version fabric_api_version <<< "$version_info"
            echo "================================"
            echo "Building for Minecraft $mc_version"
            echo "================================"
            
            # Update gradle.properties
            cat > gradle.properties <<EOF
          minecraft_version=$mc_version
          yarn_mappings=$yarn_version
          loader_version=0.16.9
          fabric_api_version=$fabric_api_version
          org.gradle.java.home=$JAVA_HOME
          EOF
            
            # Build with retry
            built_ok=0
            for attempt in 1 2; do
              echo "Build attempt ${attempt}/2 for ${mc_version}"
              if ./gradlew clean build --no-daemon; then
                built_ok=1
                break
              fi
              sleep $((attempt * 8))
            done

            if [ "$built_ok" -eq 1 ]; then
              jar_path="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | sort | head -n1 || true)"
              if [ -n "$jar_path" ]; then
                cp "$jar_path" "build/libs/statusmod-$mc_version.jar"
                built_versions+=("$mc_version")
              else
                echo "No runtime JAR found for $mc_version"
                failed_versions+=("$mc_version")
              fi
            else
              echo "Failed to build for $mc_version"
              failed_versions+=("$mc_version")
            fi
          done

          # Restore original build configuration explicitly before trap exits
          mv -f gradle.properties.bak gradle.properties
          trap - EXIT

          echo "Built versions: ${built_versions[*]:-none}"
          if [ "${#failed_versions[@]}" -gt 0 ]; then
            echo "Failed versions: ${failed_versions[*]}"
          fi
          if [ "${#built_versions[@]}" -eq 0 ]; then
            echo "No versions built successfully." >&2
            exit 1
          fi

      - name: Write version info
        run: |
          cp version.txt build/version.txt

      - name: Upload all JARs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: statusmod-jars
          path: build/libs/statusmod-*.jar
          if-no-files-found: warn

  publish-to-modrinth:
    needs: build-all-versions
    timeout-minutes: 45
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: statusmod-jars
          path: build/libs

      - name: Publish to Modrinth using mc-publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          
          files: |
            build/libs/statusmod-*.jar
          
          loaders: fabric
          game-versions: |
            1.21.10
            1.21.9
            1.21.8
            1.21.7
            1.21.6
            1.21.5
            1.21.4
            1.21.3
            1.21.2
            1.21.1
            1.20.6
            1.20.5
            1.20.4
            1.20.3
            1.20.2
            1.20.1
            1.19.4
            1.19.3
            1.19.2
            1.19
          
          name: StatusMod ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          changelog-file: CHANGELOG.md

  publish-to-curseforge:
    needs: build-all-versions
    timeout-minutes: 45
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: statusmod-jars
          path: build/libs

      - name: Publish to CurseForge using mc-publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          
          files: |
            build/libs/statusmod-*.jar
          
          loaders: fabric
          game-versions: |
            1.21.10
            1.21.9
            1.21.8
            1.21.7
            1.21.6
            1.21.5
            1.21.4
            1.21.3
            1.21.2
            1.21.1
            1.20.6
            1.20.5
            1.20.4
            1.20.3
            1.20.2
            1.20.1
            1.19.4
            1.19.3
            1.19.2
            1.19
          
          name: StatusMod ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          changelog-file: CHANGELOG.md
