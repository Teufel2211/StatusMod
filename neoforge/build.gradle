// NeoForge build (uses shared sources from ../src)
import java.util.Properties

def loaderProps = new Properties()
def loaderPropsFile = file("../gradle.properties")
if (loaderPropsFile.exists()) {
    loaderPropsFile.withInputStream { loaderProps.load(it) }
}

def requireProp = { String key ->
    def val = loaderProps.getProperty(key)
    if (val == null || val.trim().isEmpty()) {
        throw new GradleException("Missing required property '" + key + "' in ../gradle.properties")
    }
    return val.trim()
}

ext.minecraft_version = requireProp("minecraft_version")
ext.neogradle_version = requireProp("neogradle_version")
ext.neoforge_version = requireProp("neoforge_version")

def minecraft_version = project.ext.minecraft_version
def neogradle_version = project.ext.neogradle_version
def neoforge_version = project.ext.neoforge_version

// Preload and patch NeoForge userdev config to handle legacy "ats" string format.
def patchUserdevAts = { File jarFile ->
    if (!jarFile.exists()) {
        return
    }
    def zip = new java.util.zip.ZipFile(jarFile)
    def entry = zip.getEntry("config.json")
    if (entry == null) {
        zip.close()
        return
    }
    def text = zip.getInputStream(entry).getText("UTF-8")
    zip.close()

    if (text =~ /"ats"\s*:\s*\[/) {
        return
    }
    def updated = text.replaceFirst(/"ats"\s*:\s*"([^"]*)"/, '"ats": ["$1"]')
    if (updated == text) {
        return
    }

    def tmp = new File(jarFile.parentFile, jarFile.name + ".tmp")
    def zipIn = new java.util.zip.ZipFile(jarFile)
    def zos = new java.util.zip.ZipOutputStream(new FileOutputStream(tmp))
    zipIn.entries().each { e ->
        def bytes = zipIn.getInputStream(e).bytes
        if (e.name == "config.json") {
            bytes = updated.getBytes("UTF-8")
        }
        zos.putNextEntry(new java.util.zip.ZipEntry(e.name))
        zos.write(bytes)
        zos.closeEntry()
    }
    zipIn.close()
    zos.close()

    if (!jarFile.delete()) {
        tmp.delete()
        throw new GradleException("Failed to replace userdev jar: " + jarFile)
    }
    if (!tmp.renameTo(jarFile)) {
        throw new GradleException("Failed to move patched userdev jar into place: " + jarFile)
    }
}

def gradleUserHome = gradle.gradleUserHomeDir
def forgeGradleUserdevJar = new File(
    gradleUserHome,
    "caches/forge_gradle/maven_downloader/net/neoforged/neoforge/${neoforge_version}/neoforge-${neoforge_version}-userdev.jar"
)
if (!forgeGradleUserdevJar.exists()) {
    forgeGradleUserdevJar.parentFile.mkdirs()
    def url = new URL("https://maven.neoforged.net/releases/net/neoforged/neoforge/${neoforge_version}/neoforge-${neoforge_version}-userdev.jar")
    url.withInputStream { input ->
        forgeGradleUserdevJar.withOutputStream { out -> out << input }
    }
}
patchUserdevAts(forgeGradleUserdevJar)

def moduleRoot = new File(gradleUserHome, "caches/modules-2/files-2.1/net.neoforged/neoforge/${neoforge_version}")
if (moduleRoot.exists()) {
    fileTree(moduleRoot).matching {
        include "**/neoforge-${neoforge_version}-userdev.jar"
    }.each { jarFile ->
        patchUserdevAts(jarFile)
    }
}
buildscript {
    def bsProps = new Properties()
    def bsPropsFile = file("../gradle.properties")
    if (bsPropsFile.exists()) {
        bsPropsFile.withInputStream { bsProps.load(it) }
    }
    def bsNeoGradleVersion = bsProps.getProperty("neogradle_version")
    if (bsNeoGradleVersion == null || bsNeoGradleVersion.trim().isEmpty()) {
        throw new GradleException("Missing required property 'neogradle_version' in ../gradle.properties")
    }
    repositories {
        maven { url = uri("https://maven.neoforged.net/releases") }
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath "net.neoforged:NeoGradle:${bsNeoGradleVersion.trim()}"
    }
}

apply plugin: 'net.neoforged.gradle'
apply plugin: 'java'

group = 'com.teufel.statusmod'
version = file('../version.txt').text.trim()
def modVersion = version.toString()

base {
    archivesName = 'statusmod'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
}

repositories {
    mavenCentral()
    maven { url = uri("https://maven.neoforged.net/releases") }
}

dependencies {
    minecraft "net.neoforged:neoforge:${neoforge_version}"
    implementation "com.mojang:brigadier:1.0.18"
}

minecraft {
    mappings channel: 'official', version: minecraft_version
}

sourceSets {
    main {
        java.srcDirs = ["src/main/java", "src/client/java"]
        resources.srcDirs = ["src/main/resources", "src/client/resources"]
    }
}

processResources {
    inputs.property "version", modVersion
    inputs.property "minecraft_version", minecraft_version
    filesMatching(["META-INF/neoforge.mods.toml"]) {
        expand "version": modVersion, "modid": "status-mod", "name": "Status Mod", "minecraft_version": minecraft_version
    }
    from("src/main/resources/assets/status-mod/icon.png") {
        into ""
        rename { "icon.png" }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}

tasks.register('writeVersion') {
    def versionText = modVersion
    doLast {
        def outFile = file("${buildDir}/version.txt")
        outFile.parentFile.mkdirs()
        outFile.text = versionText
        println "Wrote version ${versionText} to ${outFile}"
    }
}
